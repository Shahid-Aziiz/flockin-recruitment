<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>FlockIn - Recruitment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: white;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2E7D32;
            padding-bottom: 20px;
        }
        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 5px;
        }
        .form-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .form-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }
        .form-row label {
            width: 200px;
            font-weight: bold;
        }
        .form-row input, .form-row select, .form-row textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-row textarea {
            height: 80px;
            resize: vertical;
        }
        .signature-section {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }
        .signature-box {
            width: 45%;
        }
        .signature-line {
            border-bottom: 1px solid #000;
            height: 30px;
            margin-top: 5px;
        }
        @media print {
            body { margin: 20px; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="company-name">IRE Recruitment Services</div>
        <div class="form-title">Time Off Request Form</div>
    </div>

    <div class="form-section">
        <div class="form-row">
            <label>Employee Name:</label>
            <input type="text" placeholder="Enter your full name">
        </div>
        <div class="form-row">
            <label>Employee ID:</label>
            <input type="text" placeholder="Enter your employee ID">
        </div>
        <div class="form-row">
            <label>Department:</label>
            <input type="text" placeholder="Enter your department">
        </div>
        <div class="form-row">
            <label>Position:</label>
            <input type="text" placeholder="Enter your position">
        </div>
        <div class="form-row">
            <label>Type of Leave Requested:</label>
            <select>
                <option value="">Select leave type</option>
                <option value="vacation">Vacation</option>
                <option value="sick">Sick Leave</option>
                <option value="personal">Personal Leave</option>
                <option value="bereavement">Bereavement Leave</option>
                <option value="maternity">Maternity Leave</option>
                <option value="paternity">Paternity Leave</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-row">
            <label>Start Date:</label>
            <input type="date">
        </div>
        <div class="form-row">
            <label>End Date:</label>
            <input type="date">
        </div>
        <div class="form-row">
            <label>Total Days Requested:</label>
            <input type="number" min="0" step="0.5">
        </div>
        <div class="form-row">
            <label>Reason for Leave:</label>
            <textarea placeholder="Please provide a detailed reason for your leave request"></textarea>
        </div>
        <div class="form-row">
            <label>Emergency Contact:</label>
            <input type="text" placeholder="Name of emergency contact">
        </div>
        <div class="form-row">
            <label>Emergency Phone:</label>
            <input type="tel" placeholder="Emergency contact phone number">
        </div>
    </div>

    <div class="signature-section">
        <div class="signature-box">
            <label>Employee Signature:</label>
            <div class="signature-line"></div>
            <label style="font-size: 12px; font-weight: normal;">Date:</label>
            <input type="date" style="width: 150px; margin-top: 5px;">
        </div>
        <div class="signature-box">
            <label>Manager Approval:</label>
            <div style="margin: 10px 0;">
                <input type="radio" id="approved" name="approval">
                <label for="approved" style="font-weight: normal;">Approved</label>
                <input type="radio" id="denied" name="approval">
                <label for="denied" style="font-weight: normal;">Denied</label>
            </div>
            <label>Manager Signature:</label>
            <div class="signature-line"></div>
            <label style="font-size: 12px; font-weight: normal;">Approval Date:</label>
            <input type="date" style="width: 150px; margin-top: 5px;">
        </div>
    </div>

    <div class="no-print" style="margin-top: 30px; text-align: center;">
        <button onclick="window.print()" style="padding: 10px 20px; background-color: #2E7D32; color: white; border: none; border-radius: 4px; cursor: pointer;">Print/Save as PDF</button>
    </div>
</body>
</html>
